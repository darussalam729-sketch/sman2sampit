<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izin Siswa</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f6ff;
}

.header{
  background:#1a56db;
  color:white;
  padding:15px 20px;
  font-size:18px;
  font-weight:bold;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  background:white;
  border-radius:10px;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h3{
  margin-top:0;
}

input, textarea, select{
  width:100%;
  padding:8px;
  margin-top:6px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:13px;
}

button{
  width:100%;
  padding:10px;
  background:#1a56db;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#1744a5;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th, td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:11px;
  color:white;
}

.pending{ background:#f59e0b; }
.approve{ background:#10b981; }
.reject{ background:#ef4444; }
</style>
</head>

<body>

<div class="header">
  📝 Izin Siswa
</div>

<div class="container">

  <!-- FORM IZIN -->
  <div class="card">
    <h3>Ajukan Izin</h3>

    <label>Nama Siswa</label>
    <input type="text" id="nama" placeholder="Nama siswa">

    <label>Kelas</label>
    <input type="text" id="kelas" placeholder="Contoh: XII IPA 1">

    <label>Alasan Izin</label>
    <textarea id="alasan" placeholder="Sakit / Keperluan keluarga / dll"></textarea>

    <label>Jenis Izin</label>
    <select id="jenis">
      <option>Sakit</option>
      <option>Keperluan Keluarga</option>
      <option>Izin Keluar Sekolah</option>
      <option>Lainnya</option>
    </select>

    <button onclick="kirim()">Kirim Izin</button>
  </div>

  <!-- LIST IZIN -->
  <div class="card">
    <h3>Riwayat Izin</h3>

    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Kelas</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="list">
        <tr>
          <td>Ahmad Rizki</td>
          <td>XII IPA 1</td>
          <td><span class="badge pending">Pending</span></td>
        </tr>

        <tr>
          <td>Bagus Wijaya</td>
          <td>XII IPA 1</td>
          <td><span class="badge approve">Disetujui</span></td>
        </tr>

        <tr>
          <td>Citra Dewi</td>
          <td>XII IPA 1</td>
          <td><span class="badge reject">Ditolak</span></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
function kirim(){
  const nama = document.getElementById("nama").value;
  const kelas = document.getElementById("kelas").value;

  const row = `
    <tr>
      <td>${nama}</td>
      <td>${kelas}</td>
      <td><span class="badge pending">Pending</span></td>
    </tr>
  `;

  document.getElementById("list").innerHTML += row;

  document.getElementById("nama").value = "";
  document.getElementById("kelas").value = "";
  document.getElementById("alasan").value = "";
}
</script>

</body>
</html>
