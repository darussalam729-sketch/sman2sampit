<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembinaan Siswa</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f6ff;
}

.header{
  background:#1a56db;
  color:white;
  padding:15px 20px;
  font-size:18px;
  font-weight:bold;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:1fr 350px;
  gap:16px;
}

.card{
  background:white;
  border-radius:10px;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h3{
  margin-top:0;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th, .table td{
  border-bottom:1px solid #eee;
  padding:10px;
  font-size:13px;
}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:11px;
  color:white;
}

.red{ background:#ef4444; }
.yellow{ background:#f59e0b; }
.green{ background:#10b981; }

input, textarea, select{
  width:100%;
  padding:8px;
  margin-top:6px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:13px;
}

button{
  width:100%;
  padding:10px;
  background:#1a56db;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#1744a5;
}
</style>
</head>

<body>

<div class="header">
  🧠 Pembinaan Siswa
</div>

<div class="container">

  <!-- LIST SISWA -->
  <div class="card">
    <h3>Daftar Siswa Pembinaan</h3>

    <table class="table">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Kelas</th>
          <th>Masalah</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="list">
        <tr>
          <td>Ahmad Rizki</td>
          <td>XII IPA 1</td>
          <td>Sering terlambat</td>
          <td><span class="badge red">Berat</span></td>
        </tr>

        <tr>
          <td>Bagus Wijaya</td>
          <td>XII IPA 1</td>
          <td>Tidak hadir 3x</td>
          <td><span class="badge yellow">Sedang</span></td>
        </tr>

        <tr>
          <td>Citra Dewi</td>
          <td>XII IPA 1</td>
          <td>Kurang disiplin</td>
          <td><span class="badge green">Ringan</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- FORM PEMBINAAN -->
  <div class="card">
    <h3>Tambah Pembinaan</h3>

    <label>Nama Siswa</label>
    <input type="text" id="nama" placeholder="Nama siswa">

    <label>Kelas</label>
    <input type="text" id="kelas" placeholder="Contoh: XII IPA 1">

    <label>Masalah</label>
    <textarea id="masalah" placeholder="Deskripsi masalah"></textarea>

    <label>Status</label>
    <select id="status">
      <option value="Ringan">Ringan</option>
      <option value="Sedang">Sedang</option>
      <option value="Berat">Berat</option>
    </select>

    <button onclick="tambah()">Simpan</button>
  </div>

</div>

<script>
function tambah(){
  const nama = document.getElementById("nama").value;
  const kelas = document.getElementById("kelas").value;
  const masalah = document.getElementById("masalah").value;
  const status = document.getElementById("status").value;

  const color =
    status === "Berat" ? "red" :
    status === "Sedang" ? "yellow" : "green";

  const row = `
    <tr>
      <td>${nama}</td>
      <td>${kelas}</td>
      <td>${masalah}</td>
      <td><span class="badge ${color}">${status}</span></td>
    </tr>
  `;

  document.getElementById("list").innerHTML += row;

  document.getElementById("nama").value = "";
  document.getElementById("kelas").value = "";
  document.getElementById("masalah").value = "";
}
</script>

</body>
</html>
